<!DOCTYPE html>
<html id="class">
	<head>
		<title>Documentation of {{className}}</title>
		<link rel="stylesheet" href="styles/dbm/documentation/main.css" />
		<script type="application/javascript" src="javascripts/documentation/foldableCode.js"></script>
	</head>
	<body>
		<div class="page">
			<div class="documentationTitle">Documentation</div>
			<article>
				<div class="mainInfo">
					<h1></h1>
					<div class="classPath"></div>
					<div class="classInheritance"></div>
					<div class="descriptionHolder">
						<div class="description"></div>
						<div class="spacedContent">
							<div class="smallTitle">Subclasses</div>
							<div class="subClasses linkList"></div>
						</div>
						<div class="spacedContent">
							<div class="smallTitle">Dependencies</div>
							<div class="dependencies linkList"></div>
						</div>
						<div class="foldableCode spacedContent">
							<div class="boxWithTitle foldable">
								<div class="smallTitle">Import code</div>
								<div class="codeBox snippet">
									<div class="code"></div>
								</div>
							</div>
							<div class="boxWithTitle foldable">
								<div class="smallTitle">Full code</div>
								<div class="codeBox fullCode">
									<div class="code"></div>
								</div>
							</div>
						</div>
					</div>
				</div>
				<section class="section">
					<h2>Local functions</h2>
					<div class="localFunctions">
						
					</div>
				</section>
				<section class="section">
					<h2>Static functions</h2>
					<div class="staticFunctions">
						
					</div>
				</section>
			</article>
			<footer class="footer">
				<hr />
				Documentation exported with dbm.
			</footer>
		</div>
		
		<div id="function" class="function">
			<div class="definition">
				<span class="functionName"></span>(<span class="arguments"></span>)<span class="returnValue"></span>
			</div>
			<div class="descriptionHolder">
				<div class="description"></div>
				<div class="spacedContent">
					<div class="smallTitle">Arguments</div>
					<div class="argumentsDescription"></div>
				</div>
				<div class="spacedContent">
					<div class="smallTitle">Return value</div>
					<div class="returnValueDescription"></div>
				</div>
				<div class="foldableCode spacedContent">
					<div class="boxWithTitle foldable">
						<div class="smallTitle">Full code</div>
						<div class="codeBox fullCode">
							<div class="code"></div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
