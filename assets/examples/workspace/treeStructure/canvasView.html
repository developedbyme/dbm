<!DOCTYPE html>
<html>
	<head>
		<title>Visual templates</title>
	</head>
	<body>
		<div id="treeStructure" data-dbm-class="dbm:TreeStructureView">
			
		</div>
		
		<div id="treeStructureItem" style="position: absolute;" data-dbm-class="dbm:TreeStructureItemView" data-dbm-commands="updateDisplay; flow:connectInput x indent; dynamic:addProperty name name; dynamic:addProperty outputState state">
			<div style="display: inline-block; width: 10px; height: 10px;">
				<img data-dbm-class="dbm:StateImage" data-dbm-commands="updateDisplay; flow:connectInput state state; state:addImage open open.png true; state:addImage close close.png true;" style="width: 10px; height: 10px;"/>
			</div>
			<div style="display: inline-block;">
				<div style="display: inline-block;" data-dbm-text-class="dbm:text" data-dbm-text-commands="flow:connectInput text name; updateDisplay">
					
				</div>
				<div name="layerData">
					<div class="property" name="x">x: <span name="value" data-dbm-text-class="dbm:text"></span></div>
					<div class="property" name="y">y: <span name="value" data-dbm-text-class="dbm:text"></span></div>
					<div class="property" name="rotation">rotation: <span name="value" data-dbm-text-class="dbm:text"></span></div>
					<div class="property" name="scaleX">scale x: <span name="value" data-dbm-text-class="dbm:text"></span></div>
					<div class="property" name="scaleY">scale y: <span name="value" data-dbm-text-class="dbm:text"></span></div>
					<div class="property" name="hasMask">has mask: <span name="value" data-dbm-text-class="dbm:text"></span></div>
				</div>
			</div>
		</div>
	</body>
</html>
