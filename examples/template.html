<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
		<title>Template Example</title>
		<script type="application/javascript" src="../javascripts/dbm/dbm.js"></script>
		<script type="application/javascript" src="../javascripts/dbm/classes/dbm/core/globalobjects/classmanager/ClassManager.js"></script>
		<script type="application/javascript">
			dbm.setup(window, document, "../javascripts", "classes");

		<div id="testTemplate" data-dbm-class="dbm:DisplayBaseObject">
			<div>
				<div style="background-color: #0000FF" data-dbm-class="BaseButton" data-dbm-name="testButton">Test button</div>
				<div data-dbm-name="contentArea">

					<div data-dbm-text-class="dbm:text">Test text</div>
				</div>
			</div>
