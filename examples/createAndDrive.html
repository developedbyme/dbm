<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>Test</title>
        <script type="application/javascript" src="../javascripts/dbm/dbm.js"></script>
        <script type="application/javascript">
			dbm.setup(window, document, "../javascripts", "classes");
		</script>
        <script type="application/javascript" src="../javascripts/dbm/classes/com/developedbyme/core/globalobjects/classmanager/ClassManager.js"></script>
        <script type="application/javascript" src="../javascripts/dbm/setup/defaultSetup.js"></script>
        <script type="application/javascript" src="../javascripts/examples/createAndDriveExample.js"></script>
    </head>
    <body>
    	<form>
			<input type="button" value="create new window" onclick="makeNewWindow();" style="width:300px">
		</form>
		<form>
			<input type="button" value="2" onclick="secondWin();" style="width:55px">
			<input type="button" value="3" onclick="thirdWin();" style="width:55px">
			<input type="button" value="4" onclick="fourthWin();" style="width:55px">
			<input type="button" value="5" onclick="fithWin();" style="width:55px">
			<input type="button" value="6" onclick="sixthWin();" style="width:55px">
		</form>
		<form>
			<input type="button" value="Loop" onclick="windowLoop();" style="width:300px">
		</form>
		<form>
			<input type="button" value="up/left" onmousedown="moveWindowUpLeft();" style="width:100px">
			<input type="button" value="up" onmousedown="moveWindowUp();" style="width:100px">
			<input type="button" value="up/right" onmousedown="moveWindowUpRight();" style="width:100px">
		</form>
		<form>
			<input type="button" value="left" onmousedown="moveWindowLeft();" style="width:100px">
			<input type="button" value="reset" onmousedown="moveWindowReset();" style="width:100px">
			<input type="button" value="right" onmousedown="moveWindowRight();" style="width:100px">
		</form>
		<form>
			<input type="button" value="down/left" onmousedown="moveWindowDownLeft();" style="width:100px">
			<input type="button" value="down" onmousedown="moveWindowDown();" style="width:100px">
			<input type="button" value="down/right" onmousedown="moveWindowDownRight()" style="width:100px">
		</form>
		<form>
			<input type="button" value="random" onmousedown="random();" style="width:300px">
		</form>
		<form>
			<input type="button" value="shake" onmousedown="shake();" style="width:300px">
		</form>
		<form>
			<input type="button" value="resize" onmousedown="resize();" style="width:300px">
		</form>
		<form>
			<input type="button" value="scroll left" onmousedown="moveLeft();" style="width:150px">
			<input type="button" value="scroll right" onmousedown="scrollRight();" style="width:150px">
		</form>
		<form>
			<input type="button" value="bubble" onmousedown="openMoveMultiple();" style="width:300px">
		</form>
		<form>
			<input type="button" value="close all" onmousedown="closeAll();" style="width:300px">
		</form>
    </body>
</html>
